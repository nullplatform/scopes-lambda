include:
  - "$SERVICE_PATH/values.yaml"
steps:
  - name: assume_role
    type: script
    file: "$SERVICE_PATH/utils/assume_role_step"
    output:
      - name: AWS_ACCESS_KEY_ID
        type: environment
      - name: AWS_SECRET_ACCESS_KEY
        type: environment
      - name: AWS_SESSION_TOKEN
        type: environment
  - name: build_context
    type: script
    file: "$SERVICE_PATH/scope/build_context"
    output:
      - name: SCOPE_ID
        type: environment
      - name: SCOPE_NRN
        type: environment
      - name: LAMBDA_FUNCTION_NAME
        type: environment
  - name: update_iam
    type: script
    file: "$SERVICE_PATH/scope/scripts/update_iam_role"
