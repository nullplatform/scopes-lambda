include:
  - "$SERVICE_PATH/values.yaml"
configuration:
  TOFU_ACTION: "apply"
steps:
  - name: build_context
    type: script
    file: "$SERVICE_PATH/scope/build_context"
    output:
      - name: SCOPE_ID
        type: environment
      - name: SCOPE_SLUG
        type: environment
      - name: SCOPE_NRN
        type: environment
      - name: NAMESPACE_SLUG
        type: environment
      - name: APPLICATION_SLUG
        type: environment
      - name: ACCOUNT_SLUG
        type: environment
      - name: LAMBDA_FUNCTION_NAME
        type: environment
      - name: VISIBILITY
        type: environment
      - name: PACKAGE_TYPE
        type: environment
      - name: ASSET_TYPE
        type: environment
      - name: RUNTIME
        type: environment
      - name: HANDLER
        type: environment
      - name: ARCHITECTURE
        type: environment
      - name: OUTPUT_DIR
        type: environment
      - name: RESOURCE_TAGS_JSON
        type: environment
  - name: resolve_placeholder_image
    type: script
    file: "$SERVICE_PATH/scope/scripts/resolve_placeholder_image"
    output:
      - name: IMAGE_URI
        type: environment
      - name: LAMBDA_FILENAME
        type: environment
  - name: build_tofu_context
    type: script
    file: "$SERVICE_PATH/scope/tofu/build_context"
    output:
      - name: TF_WORKING_DIR
        type: environment
      - name: TOFU_MODULE_DIR
        type: environment
      - name: TOFU_VARIABLES
        type: environment
      - name: TOFU_INIT_VARIABLES
        type: environment
      - name: MODULES_TO_USE
        type: environment
      - name: CONTEXT
        type: environment
      - name: LAMBDA_MAIN_ALIAS_NAME
        type: environment
  - name: setup_provider
    type: script
    file: "$SERVICE_PATH/scope/tofu/provider/aws/setup"
    output:
      - name: TOFU_VARIABLES
        type: environment
      - name: TOFU_INIT_VARIABLES
        type: environment
      - name: MODULES_TO_USE
        type: environment
  - name: setup_iam
    type: script
    file: "$SERVICE_PATH/scope/tofu/iam/setup"
    output:
      - name: TOFU_VARIABLES
        type: environment
      - name: MODULES_TO_USE
        type: environment
      - name: CONTEXT
        type: environment
  - name: setup_compute
    type: script
    file: "$SERVICE_PATH/scope/tofu/compute/lambda/setup"
    output:
      - name: TOFU_VARIABLES
        type: environment
      - name: MODULES_TO_USE
        type: environment
  - name: compose_modules
    type: script
    file: "$SERVICE_PATH/scope/tofu/compose_modules"
  - name: tofu
    type: script
    file: "$SERVICE_PATH/scope/tofu/do_tofu"
    output:
      - name: LAMBDA_FUNCTION_ARN
        type: environment
      - name: LAMBDA_CURRENT_VERSION
        type: environment
      - name: ALB_RULE_ARN
        type: environment
  - name: store_metadata
    type: script
    file: "$SERVICE_PATH/scope/scripts/store_nrn_metadata"
