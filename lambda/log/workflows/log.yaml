include:
  - "$SERVICE_PATH/values.yaml"
steps:
  - name: assume_role
    type: script
    file: "$SERVICE_PATH/utils/assume_role_step"
    output:
      - name: AWS_ACCESS_KEY_ID
        type: environment
      - name: AWS_SECRET_ACCESS_KEY
        type: environment
      - name: AWS_SESSION_TOKEN
        type: environment
  - name: build_context
    type: script
    file: "$SERVICE_PATH/log/build_context"
    output:
      - name: SCOPE_ID
        type: environment
      - name: LAMBDA_FUNCTION_NAME
        type: environment
      - name: LAMBDA_LOG_GROUP_NAME
        type: environment
  - name: fetch_logs
    type: script
    file: "$SERVICE_PATH/log/fetch_logs"
