include:
  - "$SERVICE_PATH/values.yaml"
steps:
  - name: assume_role
    type: script
    file: "$SERVICE_PATH/utils/assume_role_step"
    output:
      - name: AWS_ACCESS_KEY_ID
        type: environment
      - name: AWS_SECRET_ACCESS_KEY
        type: environment
      - name: AWS_SESSION_TOKEN
        type: environment
  - name: list_metrics
    type: script
    file: "$SERVICE_PATH/metric/list_metrics"
