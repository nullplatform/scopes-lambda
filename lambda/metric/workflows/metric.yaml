include:
  - "$SERVICE_PATH/values.yaml"
steps:
  - name: assume_role
    type: script
    file: "$SERVICE_PATH/utils/assume_role_step"
    output:
      - name: AWS_ACCESS_KEY_ID
        type: environment
      - name: AWS_SECRET_ACCESS_KEY
        type: environment
      - name: AWS_SESSION_TOKEN
        type: environment
  - name: build_context
    type: script
    file: "$SERVICE_PATH/metric/build_context"
    output:
      - name: SCOPE_ID
        type: environment
      - name: LAMBDA_FUNCTION_NAME
        type: environment
      - name: METRIC_NAME
        type: environment
      - name: METRIC_PERIOD
        type: environment
      - name: METRIC_START_TIME
        type: environment
      - name: METRIC_END_TIME
        type: environment
  - name: fetch_metric
    type: script
    file: "$SERVICE_PATH/metric/fetch_metric"
