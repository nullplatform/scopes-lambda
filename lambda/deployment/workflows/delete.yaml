include:
  - "$SERVICE_PATH/values.yaml"
steps:
  - name: assume_role
    type: script
    file: "$SERVICE_PATH/utils/assume_role_step"
    output:
      - name: AWS_ACCESS_KEY_ID
        type: environment
      - name: AWS_SECRET_ACCESS_KEY
        type: environment
      - name: AWS_SESSION_TOKEN
        type: environment
  - name: build_context
    type: script
    file: "$SERVICE_PATH/deployment/build_context"
    output:
      - name: SCOPE_ID
        type: environment
      - name: DEPLOYMENT_ID
        type: environment
      - name: LAMBDA_FUNCTION_NAME
        type: environment
      - name: LAMBDA_GREEN_VERSION
        type: environment
      - name: LAMBDA_CURRENT_VERSION
        type: environment
  - name: cleanup_version
    type: script
    file: "$SERVICE_PATH/deployment/scripts/cleanup_new_version"
